name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-algoforge:
    name: E2E — AlgoForge
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # ── Python (for the FastAPI dev server) ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      # ── Node.js (for Playwright) ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create e2e-tests directory & install
        run: |
          mkdir -p ../e2e-tests
          # Copy tests from the repo (they live alongside the app)
          # If e2e-tests is a separate repo, replace with a checkout step
          cat > ../e2e-tests/package.json << 'PKGJSON'
          {
            "name": "e2e-tests",
            "version": "1.0.0",
            "devDependencies": { "@playwright/test": "^1.58.0" }
          }
          PKGJSON
          cd ../e2e-tests
          npm install
          npx playwright install --with-deps chromium

      - name: Copy test files
        run: |
          # Copy the test suite into the e2e-tests workspace
          cp -r e2e-tests/playwright.config.ts ../e2e-tests/ 2>/dev/null || true
          cp -r e2e-tests/tsconfig.json ../e2e-tests/ 2>/dev/null || true
          cp -r e2e-tests/tests ../e2e-tests/ 2>/dev/null || true

      # ── Start AlgoForge server ──
      - name: Start AlgoForge dev server
        env:
          ALGOFORGE_PIN: "123456"
          DHAN_CLIENT_ID: "e2e-dummy"
          DHAN_ACCESS_TOKEN: "e2e-dummy-token"
        run: |
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/login > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:8000/login > /dev/null || (echo "Server failed to start" && exit 1)
          echo "AlgoForge is up on :8000"

      # ── Run Playwright tests ──
      - name: Run Playwright tests
        env:
          E2E_PIN: "123456"
        working-directory: ../e2e-tests
        run: npx playwright test --project=algoforge

      # ── Upload artifacts on failure ──
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-algoforge
          path: |
            ../e2e-tests/playwright-report/
            ../e2e-tests/test-results/
          retention-days: 14

  # ── Deploy (only on push to main, gated on E2E passing) ──────
  deploy-algoforge:
    name: Deploy — AlgoForge
    needs: [e2e-algoforge]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-algoforge
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          EOF

      - name: Run zero-downtime deploy
        run: |
          ssh deploy-target "cd ~/algoforge && git fetch origin main && git reset --hard origin/main && bash deploy/cd-deploy.sh"

      - name: Verify deployment
        run: |
          sleep 3
          ssh deploy-target "curl -sf http://127.0.0.1:\$(cat ~/.algoforge-active-port)/api/health && echo ' ✅ Health OK' || echo ' ❌ Health FAILED'"

      - name: Post-deploy summary
        if: always()
        run: |
          ssh deploy-target "echo '── AlgoForge Deploy Status ──' && systemctl is-active algoforge@\$(cat ~/.algoforge-active-port) && echo 'Active port:' \$(cat ~/.algoforge-active-port)"
