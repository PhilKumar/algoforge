# ═══════════════════════════════════════════════════════════════
#  AlgoForge Nginx Config (Blue-Green zero-downtime deploy)
#
#  Upstream is defined in /etc/nginx/conf.d/algoforge-upstream.conf
#  and swapped automatically by cd-deploy.sh during deployments.
# ═══════════════════════════════════════════════════════════════

# Fallback upstream — overridden by algoforge-upstream.conf
# (only used if the upstream file hasn't been created yet)
upstream algoforge_backend_default {
    server 127.0.0.1:8000;
    keepalive 16;              # persistent connections to uvicorn
    keepalive_requests 10000;
    keepalive_timeout 60s;
}

server {
    listen 80 default_server;
    server_name _;

    # ── TCP Latency Tuning ──────────────────────────────────
    tcp_nodelay on;            # disable Nagle — send small packets immediately
    tcp_nopush  on;            # combine headers into one packet (works with sendfile)

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Allow chart screenshot uploads up to 12 MB
    client_max_body_size 12m;

    # ── HOT PATH: Scalp execution (minimal overhead) ────────
    location /api/scalp/ {
        proxy_pass         http://algoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_request_buffering off;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_connect_timeout 2s;
    }

    # Long-running backfill endpoint
    location /api/portfolio/backfill {
        proxy_pass         http://algoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # API traffic
    location /api/ {
        proxy_pass         http://algoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket (live trading) — long timeout preserves connections
    location /ws {
        proxy_pass         http://algoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # Health check
    location /health {
        proxy_pass http://algoforge_backend;
    }

    # Catch-all (HTML pages, static assets, login, etc.)
    location / {
        proxy_pass         http://algoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
