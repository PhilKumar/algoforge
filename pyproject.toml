[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", "scripts"]
skips = ["B101", "B311", "B110", "B105"]
# B101=assert, B311=random (not crypto)
# B110=try-except-pass (intentional silent fallbacks in trading code)
# B105=hardcoded-password-string (placeholder sentinel strings, not real creds)
severity = "medium"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
  "E501",  # line-too-long (handled by ruff-format)
  "F841",  # unused variable
  "E402",  # module-import-not-at-top (FastAPI conditional imports after env setup)
  "F821",  # undefined-name (forward refs resolved at runtime: _logger, _get_redis, etc.)
  "E722",  # bare-except (intentional in WebSocket/async error boundaries)
]

[tool.ruff.lint.per-file-ignores]
"engine/backtest.py" = ["E701", "E702"]  # pre-existing compact one-liner style
"scripts/*.py" = ["E701", "E702", "E741", "F401", "F811"]  # debug scripts
