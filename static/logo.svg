<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Core gradient: emerald → sapphire -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
    <!-- Gold accent for sparks & forge heat -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Amber-gold gradient for ALGOFORGE title -->
    <linearGradient id="titleGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Hot core glow -->
    <radialGradient id="hotcore" cx="50%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="50%" stop-color="#0d1222"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Top edge shine -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#4f8ef7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Shield inner shadow -->
    <radialGradient id="shieldGlow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="ds" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Glow filter -->
    <filter id="gf">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Spark glow -->
    <filter id="sparkGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <!-- Subtle inner bevel -->
    <filter id="bevel">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer border with gradient -->
  <rect width="508" height="508" x="2" y="2" rx="78" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.25"/>

  <!-- Top edge accent line -->
  <rect x="40" y="2" width="432" height="2" rx="1" fill="url(#shine)" opacity="0.7"/>

  <!-- Corner accents -->
  <path d="M80 2 L2 2 Q2 2 2 80" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <path d="M432 2 L510 2 Q510 2 510 80" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <path d="M2 432 L2 510 Q2 510 80 510" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.15"/>
  <path d="M510 432 L510 510 Q510 510 432 510" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.15"/>

  <!-- ═══ SHIELD CREST ═══ -->
  <!-- Shield shadow layer -->
  <path d="M256 62 L408 134 L408 268 C408 352 348 410 256 452 C164 410 104 352 104 268 L104 134 Z"
        fill="#000" opacity="0.3" transform="translate(0,6)"/>

  <!-- Shield body — dark interior -->
  <path d="M256 62 L408 134 L408 268 C408 352 348 410 256 452 C164 410 104 352 104 268 L104 134 Z"
        fill="#0a0f1e"/>

  <!-- Shield inner glow -->
  <path d="M256 62 L408 134 L408 268 C408 352 348 410 256 452 C164 410 104 352 104 268 L104 134 Z"
        fill="url(#shieldGlow)"/>

  <!-- Shield border — gradient stroke -->
  <path d="M256 62 L408 134 L408 268 C408 352 348 410 256 452 C164 410 104 352 104 268 L104 134 Z"
        fill="none" stroke="url(#g1)" stroke-width="3" stroke-linejoin="round" opacity="0.5"/>

  <!-- Shield inner border (depth layer) -->
  <path d="M256 76 L396 142 L396 264 C396 342 340 396 256 434 C172 396 116 342 116 264 L116 142 Z"
        fill="none" stroke="url(#titleGold)" stroke-width="0.8" stroke-linejoin="round" opacity="0.12"/>

  <!-- Shield horizontal divider -->
  <line x1="130" y1="300" x2="382" y2="300" stroke="url(#g1)" stroke-width="1" opacity="0.15"/>

  <!-- ═══ CROSS — blended into shield background ═══ -->
  <!-- Cross glow (soft radiance behind the cross) -->
  <ellipse cx="256" cy="220" rx="45" ry="90" fill="#fbbf24" opacity="0.025"/>
  <!-- Vertical beam -->
  <rect x="248" y="100" width="16" height="260" rx="4" fill="url(#titleGold)" opacity="0.06"/>
  <rect x="250" y="105" width="12" height="250" rx="3" fill="url(#titleGold)" opacity="0.04"/>
  <!-- Horizontal beam -->
  <rect x="175" y="185" width="162" height="16" rx="4" fill="url(#titleGold)" opacity="0.06"/>
  <rect x="180" y="187" width="152" height="12" rx="3" fill="url(#titleGold)" opacity="0.04"/>
  <!-- Cross outline (subtle stroke for definition) -->
  <path d="M248 108 L248 100 Q248 96 252 96 L260 96 Q264 96 264 100 L264 185
           L333 185 Q337 185 337 189 L337 197 Q337 201 333 201 L264 201
           L264 356 Q264 360 260 360 L252 360 Q248 360 248 356 L248 201
           L179 201 Q175 201 175 197 L175 189 Q175 185 179 185 L248 185 Z"
        fill="none" stroke="url(#titleGold)" stroke-width="0.6" opacity="0.08"/>
  <!-- Cross center intersection highlight -->
  <rect x="248" y="185" width="16" height="16" rx="2" fill="url(#titleGold)" opacity="0.08"/>

  <!-- ═══ CHART SECTION (upper shield) ═══ -->
  <!-- Grid lines for chart area -->
  <line x1="150" y1="170" x2="362" y2="170" stroke="#1e293b" stroke-width="0.5" opacity="0.6"/>
  <line x1="150" y1="200" x2="362" y2="200" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
  <line x1="150" y1="230" x2="362" y2="230" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
  <line x1="150" y1="260" x2="362" y2="260" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>

  <!-- Candlestick 1 (bearish) -->
  <line x1="180" y1="175" x2="180" y2="275" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <rect x="170" y="200" width="20" height="50" rx="2.5" fill="#ef4444" opacity="0.7"/>
  <rect x="170" y="200" width="20" height="50" rx="2.5" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>

  <!-- Candlestick 2 (bullish, recovering) -->
  <line x1="218" y1="190" x2="218" y2="270" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <rect x="208" y="210" width="20" height="40" rx="2.5" fill="url(#g1)" opacity="0.55"/>
  <rect x="208" y="210" width="20" height="40" rx="2.5" fill="none" stroke="url(#g1)" stroke-width="0.5" opacity="0.3"/>

  <!-- Candlestick 3 (strong bullish — hero candle) -->
  <line x1="256" y1="148" x2="256" y2="268" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <rect x="244" y="165" width="24" height="78" rx="3" fill="url(#g1)" opacity="0.85"/>
  <rect x="244" y="165" width="24" height="78" rx="3" fill="none" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>

  <!-- Candlestick 4 (bullish continuation) -->
  <line x1="294" y1="155" x2="294" y2="245" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <rect x="284" y="170" width="20" height="55" rx="2.5" fill="url(#g1)" opacity="0.7"/>
  <rect x="284" y="170" width="20" height="55" rx="2.5" fill="none" stroke="url(#g1)" stroke-width="0.5" opacity="0.3"/>

  <!-- Candlestick 5 (bullish breakout) -->
  <line x1="332" y1="140" x2="332" y2="230" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <rect x="322" y="155" width="20" height="52" rx="2.5" fill="url(#g1)" opacity="0.65"/>
  <rect x="322" y="155" width="20" height="52" rx="2.5" fill="none" stroke="url(#g1)" stroke-width="0.5" opacity="0.3"/>

  <!-- Ascending trendline -->
  <line x1="155" y1="270" x2="355" y2="148" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5" stroke-dasharray="6,4"/>

  <!-- Breakout arrow — bold ascending line -->
  <polyline points="220,250 256,200 294,185 340,155"
            fill="none" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#bevel)"/>
  <!-- Arrow head -->
  <polygon points="345,150 330,148 334,162" fill="url(#g1)" opacity="0.9"/>

  <!-- Hot glow behind forge area -->
  <ellipse cx="256" cy="350" rx="100" ry="40" fill="url(#hotcore)"/>

  <!-- ═══ ANVIL / FORGE (lower shield) ═══ -->
  <!-- Anvil body -->
  <path d="M190 325 L185 315 Q182 310 190 308 L322 308 Q330 310 327 315 L322 325 L340 330
           Q348 334 348 340 L350 355 Q352 365 342 368 L170 368 Q160 365 162 355 L164 340
           Q164 334 172 330 Z"
        fill="#0f172a" stroke="url(#g1)" stroke-width="2" opacity="0.6"/>
  <!-- Anvil top surface highlight -->
  <path d="M190 308 L322 308 Q330 310 327 315 L185 315 Q182 310 190 308 Z"
        fill="url(#g1)" opacity="0.12"/>
  <!-- Anvil face shine -->
  <rect x="180" y="330" width="152" height="2" rx="1" fill="url(#g1)" opacity="0.08"/>

  <!-- Hammer (diagonal, striking the anvil) -->
  <g transform="rotate(-35, 310, 270)">
    <!-- Hammer handle -->
    <rect x="305" y="230" width="7" height="75" rx="3" fill="#334155" opacity="0.8"/>
    <rect x="305" y="230" width="7" height="75" rx="3" fill="none" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
    <!-- Hammer head -->
    <rect x="294" y="218" width="30" height="18" rx="3" fill="#1e293b" stroke="url(#titleGold)" stroke-width="1.5" opacity="0.7"/>
    <rect x="296" y="220" width="26" height="4" rx="1" fill="url(#titleGold)" opacity="0.15"/>
  </g>

  <!-- ═══ SPARKS (forge strike) ═══ -->
  <!-- Central impact spark -->
  <circle cx="275" cy="306" r="3.5" fill="url(#gold)" filter="url(#sparkGlow)" opacity="0.9"/>

  <!-- Spark trails radiating from impact -->
  <line x1="275" y1="302" x2="278" y2="288" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="272" y1="303" x2="262" y2="290" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="279" y1="303" x2="292" y2="292" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="270" y1="305" x2="255" y2="296" stroke="url(#gold)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="282" y1="305" x2="298" y2="298" stroke="url(#gold)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Small scattered spark dots -->
  <circle cx="260" cy="287" r="1.5" fill="#fbbf24" opacity="0.65"/>
  <circle cx="295" cy="290" r="1.2" fill="#fde68a" opacity="0.55"/>
  <circle cx="252" cy="294" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="300" cy="296" r="1" fill="#fde68a" opacity="0.35"/>
  <circle cx="280" cy="282" r="1.8" fill="#fbbf24" opacity="0.5"/>

  <!-- ═══ BOTTOM TEXT: ALGOFORGE ═══ -->
  <!-- Text shadow -->
  <text x="256" y="428" text-anchor="middle"
        font-family="'Syne','Inter','SF Pro Display',system-ui,sans-serif"
        font-weight="800" font-size="38" letter-spacing="8"
        fill="#000" opacity="0.4" transform="translate(0,2)">ALGOFORGE</text>

  <!-- Main text -->
  <text x="256" y="428" text-anchor="middle"
        font-family="'Syne','Inter','SF Pro Display',system-ui,sans-serif"
        font-weight="800" font-size="38" letter-spacing="8"
        fill="url(#g1)">ALGOFORGE</text>

  <!-- Decorative lines flanking bottom -->
  <line x1="100" y1="442" x2="195" y2="442" stroke="url(#g1)" stroke-width="1" opacity="0.2"/>
  <line x1="317" y1="442" x2="412" y2="442" stroke="url(#g1)" stroke-width="1" opacity="0.2"/>
  <circle cx="256" cy="442" r="2" fill="url(#g1)" opacity="0.3"/>

  <!-- Tagline -->
  <text x="256" y="462" text-anchor="middle"
        font-family="'Inter','SF Pro Text',system-ui,sans-serif"
        font-weight="500" font-size="13" letter-spacing="4.5"
        fill="url(#titleGold)" opacity="0.85">ALGORITHMS OVER IMPULSE</text>

  <!-- ═══ SUBTLE CORNER FILIGREE ═══ -->
  <path d="M40 30 Q50 20 70 22" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.15"/>
  <path d="M472 30 Q462 20 442 22" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.15"/>
  <path d="M40 482 Q50 492 70 490" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.1"/>
  <path d="M472 482 Q462 492 442 490" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.1"/>
</svg>
